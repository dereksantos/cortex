id: go-testing
name: "Go Testing Patterns"

context:
  - type: pattern
    content: |
      Testing standards for this project:
      - Always use table-driven tests with t.Run subtests
      - Test function naming: Test<Type>_<Method> (e.g., TestUserService_Create)
      - Use testify/assert for assertions (already in go.mod)
      - Mocks go in internal/mocks/ generated by mockery
      - Integration tests tagged with //go:build integration
  - type: pattern
    content: |
      Example table-driven test:
      func TestUserService_Create(t *testing.T) {
          tests := []struct {
              name    string
              input   CreateUserInput
              want    *User
              wantErr bool
          }{
              {
                  name:  "valid user",
                  input: CreateUserInput{Email: "test@example.com"},
                  want:  &User{Email: "test@example.com"},
              },
              {
                  name:    "empty email",
                  input:   CreateUserInput{Email: ""},
                  wantErr: true,
              },
          }
          for _, tt := range tests {
              t.Run(tt.name, func(t *testing.T) {
                  // test implementation
              })
          }
      }

tests:
  - id: write-unit-test
    query: "How should I write a unit test for my OrderService.Cancel method?"
    expect:
      includes: ["t.Run"]
      ranking: ["table-driven", "t.Run", "TestOrderService_Cancel"]

  - id: test-naming
    query: "What should I name my test function for the PaymentService.Process method?"
    expect:
      includes: ["TestPaymentService_Process"]
      excludes: ["TestProcess", "Test_Process"]
      ranking: ["TestPaymentService_Process", "Test<Type>_<Method>"]

  - id: assertion-library
    query: "What assertion library should I use in my tests?"
    expect:
      includes: ["testify", "assert"]
      ranking: ["testify", "assert", "go.mod"]
