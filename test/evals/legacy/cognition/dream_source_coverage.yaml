id: dream-source-coverage
type: dream
name: "Dream explores multiple sources"
description: "Verify Dream samples from all registered DreamSources including project files, cortex data, claude history, and git history"

# Sources Dream should explore
dream_sources:
  - project
  - cortex
  - claude-history
  - git

# At least 3 insights per session — region sampling lifts the floor.
expected_insights: 3

# Yield-weighted budget redistribution + ε-greedy bonus keeps coverage
# wide across cycles, so 60% of registered sources should appear.
expected_coverage: 0.6

# Dream should respect budget constraints
budget_must_respect: true
