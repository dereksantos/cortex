id: dream-budget-respect
type: dream
name: "Dream respects budget constraints"
description: "Verify Dream mode operates within configured budget limits and doesn't over-consume resources during idle processing"

# Minimal sources for budget test
dream_sources:
  - project
  - cortex

# Region-based sampling surfaces more items per cycle, so this floor
# was raised when Dream became fractal. Budget remains the load-bearing
# assertion; insight count is a soft floor.
expected_insights: 2

# Minimal coverage expected
expected_coverage: 0.3

# Critical: budget must be respected (follow-up + source allocation
# combined must not exceed DreamBudget).
budget_must_respect: true
