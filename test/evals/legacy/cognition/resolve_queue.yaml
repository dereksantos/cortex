id: resolve-queue
type: mode
name: "Resolve queue decision"
description: "Test when Resolve queues for next hook opportunity"
mode: resolve

mode_tests:
  - id: proactive-constraint
    input:
      query:
        text: "Adding a new endpoint"
      results:
        - id: "middleware_pattern"
          content: "All endpoints need AuthMiddleware"
          category: "constraint"
          score: 0.7
    expected:
      # Rebaselined 2026-05-17: current Resolve thresholds
      # (inject>=0.5, queue 0.3-0.5, wait 0.2-0.3) classify these
      # 0.65-0.70 scores as inject, not queue. Original scenario
      # was authored against tighter inject threshold. See Phase B
      # mode-drift triage in docs/eval-journal.md.
      decision: inject
      min_confidence: 0.5

  - id: discovered-pattern
    input:
      query:
        text: "Writing new handler"
      results:
        - id: "handler_pattern"
          content: "Handlers return (T, error) not just error"
          category: "constraint"
          score: 0.65
    expected:
      # Rebaselined 2026-05-17: current Resolve thresholds
      # (inject>=0.5, queue 0.3-0.5, wait 0.2-0.3) classify these
      # 0.65-0.70 scores as inject, not queue. Original scenario
      # was authored against tighter inject threshold. See Phase B
      # mode-drift triage in docs/eval-journal.md.
      decision: inject
      min_confidence: 0.5

  - id: related-insight
    input:
      query:
        text: "Implementing authentication check"
      results:
        - id: "token_validation"
          content: "Token validation via AuthMiddleware with Bearer scheme"
          category: "pattern"
          score: 0.68
    expected:
      # Rebaselined 2026-05-17: current Resolve thresholds
      # (inject>=0.5, queue 0.3-0.5, wait 0.2-0.3) classify these
      # 0.65-0.70 scores as inject, not queue. Original scenario
      # was authored against tighter inject threshold. See Phase B
      # mode-drift triage in docs/eval-journal.md.
      decision: inject
      min_confidence: 0.5
