id: dream-insight-quality
type: dream
name: "Dream generates useful insights"
description: "Verify Dream produces insights that can inform future retrievals - patterns, decisions, and relationships extracted from sampled content"

# Test with all available sources
dream_sources:
  - project
  - cortex
  - git

# With region sampling and novelty dedupe, expect more discoveries per
# cycle (windows of large files surface signal that was previously
# truncated away).
expected_insights: 5

# Full coverage not required - focus is on insight quality
expected_coverage: 0.4

# Budget must be respected
budget_must_respect: true
