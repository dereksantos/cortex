id: "idiom-go-testing-001"
type: "idiom"
name: "Go Testing Patterns"
description: "Tests if Cortex helps follow project test conventions"
domain: "testing"

context_chain:
  - type: pattern
    content: |
      Testing standards for this project:
      - Always use table-driven tests with t.Run subtests
      - Test function naming: Test<Type>_<Method> (e.g., TestUserService_Create)
      - Use testify/assert for assertions (already in go.mod)
      - Mocks go in internal/mocks/ generated by mockery
      - Integration tests tagged with //go:build integration

  - type: implementation
    file: "internal/user/service_test.go"
    content: |
      func TestUserService_Create(t *testing.T) {
          tests := []struct {
              name    string
              input   CreateUserInput
              want    *User
              wantErr bool
          }{
              {
                  name:  "valid user",
                  input: CreateUserInput{Email: "test@example.com"},
                  want:  &User{Email: "test@example.com"},
              },
              {
                  name:    "empty email",
                  input:   CreateUserInput{Email: ""},
                  wantErr: true,
              },
          }
          for _, tt := range tests {
              t.Run(tt.name, func(t *testing.T) {
                  // test implementation
              })
          }
      }

test_prompts:
  - id: "write-unit-test"
    prompt: "How should I write a unit test for my OrderService.Cancel method?"
    ground_truth:
      must_include:
        - "t.Run"
        - "[]struct"
      must_exclude:
        - "individual test functions"

  - id: "test-naming"
    prompt: "What should I name my test function for the PaymentService.Process method?"
    ground_truth:
      must_include:
        - "TestPaymentService_Process"
      must_exclude:
        - "TestProcess"
        - "Test_Process"

  - id: "assertion-library"
    prompt: "What assertion library should I use in my tests?"
    ground_truth:
      must_include:
        - "testify"
        - "assert"
      must_exclude:
        - "if err != nil"
        - "manual comparison"

metadata:
  author: "cortex-eval"
  tags: "testing, table-driven, conventions"
