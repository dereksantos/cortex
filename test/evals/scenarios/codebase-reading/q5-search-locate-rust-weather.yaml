id: q5-search-locate-rust-weather
group: Q
eval: Q5
project: rust-weather
language: rust
prompt: |
  Where does the code return HTTP 401? Cite one file:line range, not a
  raw grep dump.
expected:
  hop_count_min: 1
  hop_count_max: 4
  inspect_count_min: 1
  inspect_count_max: 7
  citation_rate_min: 0.2
  hedge_count_max: -1
  must_cite_paths:
    - src/auth.rs
  must_not_invent:
    - middleware/auth.rs
    - AuthError::Unauthorized
  budget_token_min: 3000
  budget_token_max: 40000
judge_rubric: |
  Pass only if the answer cites the StatusCode::UNAUTHORIZED return in
  src/auth.rs with a file:line range. A raw grep dump or unrelated
  citation is a fail.
