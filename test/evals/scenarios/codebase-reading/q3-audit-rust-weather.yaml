id: q3-audit-rust-weather
group: Q
eval: Q3
project: rust-weather
language: rust
prompt: |
  Compare README.md against the actual code under src/. List 3-5
  claims that are confirmed, outdated, or missing — each with a
  file:line citation.
expected:
  hop_count_min: 2
  hop_count_max: 8
  citation_rate_min: 0.5
  hedge_count_max: -1
  unverified_tail_count_max: -1
  must_cite_paths:
    - README.md
    - src/
  must_not_invent:
    - src/database.rs
    - src/grpc.rs
  budget_token_min: 15000
  budget_token_max: 200000
judge_rubric: |
  Pass only if the answer lists 3-5 distinct claims, EACH with a
  citation to a real file (README.md, src/*.rs). Generic prose without
  per-claim citations is a fail.
