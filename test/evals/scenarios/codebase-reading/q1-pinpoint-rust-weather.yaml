id: q1-pinpoint-rust-weather
group: Q
eval: Q1
project: rust-weather
language: rust
prompt: |
  What integer value is the constant FORECAST_HOURS set to in
  src/models.rs?
expected:
  hop_count_min: 1
  hop_count_max: 2
  read_count_min: 1
  read_count_max: 3
  citation_rate_min: 0.2
  hedge_count_max: -1
  must_cite_paths:
    - src/models.rs
  must_not_invent:
    - FORECAST_HOUR_COUNT
    - HOURS_AHEAD
