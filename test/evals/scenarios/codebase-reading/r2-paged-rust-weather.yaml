id: r2-paged-rust-weather
group: R
eval: R2
project: rust-weather
language: rust
prompt: |
  Summarize what Forecast::synthetic does in src/models.rs and cite the
  line range you read.
expected:
  hop_count_min: 1
  hop_count_max: 3
  read_count_min: 1
  read_count_max: 4
