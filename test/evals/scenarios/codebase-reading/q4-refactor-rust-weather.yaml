id: q4-refactor-rust-weather
group: Q
eval: Q4
project: rust-weather
language: rust
prompt: |
  Suppose src/handlers.rs grew. Propose a split into 2-3 modules (by
  endpoint or domain). Name actual functions from src/handlers.rs that
  would move into each. NEED_MORE: if you can't enumerate symbols.
expected:
  hop_count_min: 1
  hop_count_max: 5
  read_count_min: 1
  read_count_max: 6
  citation_rate_min: 0.3
  hedge_count_max: -1
  must_cite_paths:
    - src/handlers.rs
  must_not_invent:
    - admin_handlers
    - login_handlers
  budget_token_min: 6000
  budget_token_max: 80000
judge_rubric: |
  Pass only if each proposed module names REAL functions from
  src/handlers.rs (current, forecast, health). Inventions are a fail.
