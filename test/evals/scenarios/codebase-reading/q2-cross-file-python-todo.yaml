id: q2-cross-file-python-todo
group: Q
eval: Q2
project: python-todo
language: python
prompt: |
  How does app/routes.py consume the storage layer in app/storage.py?
  Cite the producer interface and one consumer call site.
expected:
  hop_count_min: 1
  hop_count_max: 5
  read_count_min: 2
  read_count_max: 6
  citation_rate_min: 0.3
  hedge_count_max: -1
  must_cite_paths:
    - app/routes.py
    - app/storage.py
  must_not_invent:
    - Database
    - PgStorage
  budget_token_min: 5000
  budget_token_max: 50000
judge_rubric: |
  Pass only if the answer names a real TodoStorage method (list, add,
  get, remove, update) AND cites the route handler call site. Generic
  prose without both citations is a fail.
