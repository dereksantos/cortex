id: q2-cross-file-leanjs
group: Q
eval: Q2
project: leanjs
language: js
prompt: |
  How do the example apps under examples/ consume the schema function
  exported from lean.js? Pick one example and cite both the producer
  (lean.js) and the consumer (the example file) with file:line ranges.
expected:
  hop_count_min: 1
  hop_count_max: 5
  read_count_min: 2
  read_count_max: 8
  citation_rate_min: 0.3
  hedge_count_max: -1
  must_cite_paths:
    - lean.js
    - examples/
  must_not_invent:
    - schemaBuilder
    - createSchema
  budget_token_min: 5000
  budget_token_max: 60000
judge_rubric: |
  Pass only if the answer (a) names a real example app directory under
  examples/ (counter, todo-list, triage, user-profile, github-indexer) AND
  (b) cites where lean.js exports schema/object/string/etc. that the
  example imports. Generic prose without both citations is a fail.
