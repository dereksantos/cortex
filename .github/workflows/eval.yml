name: Eval

on:
  push:
    branches: [ main ]
    paths:
      - 'internal/eval/**'
      - 'test/evals/**'
      - 'pkg/llm/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'internal/eval/**'
      - 'test/evals/**'
      - 'pkg/llm/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Eval mode'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - full
      model:
        description: 'Ollama model (for full mode)'
        required: false
        default: 'qwen2:0.5b'

jobs:
  eval-dry-run:
    name: Eval Framework Test (Dry Run)
    runs-on: ubuntu-latest
    if: github.event.inputs.mode != 'full'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build cortex
      run: go build -o cortex ./cmd/cortex

    - name: Run eval (mechanic suite — deterministic, no external LLM)
      # The mechanic suite (5 DAG fixtures) replaces the legacy
      # `--dry-run` flag that was retired under audit A-finish. It
      # exercises the full eval persister + DAG executor with mock
      # nodes, so a CI runner without API keys can still smoke the
      # eval framework. See docs/simplification-audit.md.
      run: |
        ./cortex eval suite mechanic 2>&1 | tee eval-results.json

    - name: Upload eval results
      uses: actions/upload-artifact@v7
      with:
        name: eval-results-dry-run
        path: eval-results.json
        retention-days: 30

    - name: Check eval pass rate
      run: |
        if [ -f eval-results.json ]; then
          echo "Eval results generated successfully"
          cat eval-results.json | head -100
        fi

  eval-full:
    name: Full Eval (Manual/Self-hosted)
    runs-on: self-hosted
    if: github.event.inputs.mode == 'full'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build cortex
      run: go build -o cortex ./cmd/cortex

    - name: Check Ollama
      run: |
        if ! command -v ollama &> /dev/null; then
          echo "Ollama not installed on this runner"
          exit 1
        fi
        ollama list

    - name: Run full eval
      # Drives the cortex coding harness against the v2 smoke scenario.
      # The --model selector is the workflow input. Audit A-finish
      # retired the bare `cortex eval --model X` form; the v2 surface
      # requires `-s SCEN.yaml -m MODEL` (or a positional subcommand).
      run: |
        MODEL="${{ github.event.inputs.model }}"
        ./cortex eval -s test/evals/coding/fizzbuzz.yaml -m "$MODEL" --output json > eval-results.json
        ./cortex eval -s test/evals/coding/fizzbuzz.yaml -m "$MODEL" --verbose

    - name: Upload eval results
      uses: actions/upload-artifact@v7
      with:
        name: eval-results-${{ github.event.inputs.model }}
        path: eval-results.json
        retention-days: 90

    - name: Post eval summary
      run: |
        echo "## Eval Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Model: ${{ github.event.inputs.model }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        # Extract summary from JSON
        if [ -f eval-results.json ]; then
          cat eval-results.json >> $GITHUB_STEP_SUMMARY
        fi
