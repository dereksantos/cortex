name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Windows excluded: the eval-harness work relies on POSIX
        # subprocess group semantics (syscall.Setpgid, SIGTERM/SIGKILL
        # via PID groups) that have no clean Windows equivalent. Files
        # needing exclusion already carry //go:build !windows tags so
        # local builds on Windows fail fast rather than silently
        # misbehaving. Re-adding Windows to CI would require a shim
        # layer for subprocess lifecycle — significantly more code than
        # the exclusion saves.
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.25']

    steps:
    # harden-runner audits unexpected egress during the build. Picks up
    # a compromised dep phoning home during `go mod download` or
    # `go test`. Starts in audit mode; flip to block once we know the
    # legitimate egress set.
    - name: Harden runner
      uses: step-security/harden-runner@v2
      # harden-runner doesn't support macOS runners yet — only Linux.
      if: runner.os == 'Linux'
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Get dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests with coverage
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Build
      run: go build -v ./cmd/cortex

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Harden runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install golangci-lint from source
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

    - name: Run golangci-lint
      run: golangci-lint run --timeout=5m

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
    - name: Harden runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    # govulncheck flags known-bad Go modules from the osv.dev database.
    # This is the AI-supply-chain backstop: a slopsquatted or recently
    # disclosed-vulnerable module gets caught in CI before merge.
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      run: govulncheck ./...

    # OSV-Scanner covers both Go and npm trees and pulls from a broader
    # advisory database than govulncheck alone — catches malicious-
    # package advisories (typosquats, takeover-driven attacks) in
    # addition to vulnerability CVEs.
    - name: Run OSV-Scanner
      uses: google/osv-scanner-action/osv-scanner-action@v1
      with:
        scan-args: |-
          --recursive
          --skip-git
          ./

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: [test, lint, security]

    steps:
    - name: Harden runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build for Linux
      run: GOOS=linux GOARCH=amd64 go build -o cortex-linux-amd64 ./cmd/cortex

    - name: Build for macOS (Intel)
      run: GOOS=darwin GOARCH=amd64 go build -o cortex-darwin-amd64 ./cmd/cortex

    - name: Build for macOS (Apple Silicon)
      run: GOOS=darwin GOARCH=arm64 go build -o cortex-darwin-arm64 ./cmd/cortex

    # Windows build dropped — see matrix comment above. We're not
    # shipping a Windows binary while the eval-harness work blocks it.

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          cortex-*
        retention-days: 7
