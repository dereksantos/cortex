name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Windows excluded: the eval-harness work relies on POSIX
        # subprocess group semantics (syscall.Setpgid, SIGTERM/SIGKILL
        # via PID groups) that have no clean Windows equivalent. Files
        # needing exclusion already carry //go:build !windows tags so
        # local builds on Windows fail fast rather than silently
        # misbehaving. Re-adding Windows to CI would require a shim
        # layer for subprocess lifecycle — significantly more code than
        # the exclusion saves.
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.26']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Get dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run tests with coverage
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Build
      run: go build -v ./cmd/cortex

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
      with:
        file: ./coverage.txt
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install golangci-lint from source
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

    - name: Run golangci-lint
      run: golangci-lint run --timeout=5m

  build:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build for Linux
      run: GOOS=linux GOARCH=amd64 go build -o cortex-linux-amd64 ./cmd/cortex

    - name: Build for macOS (Intel)
      run: GOOS=darwin GOARCH=amd64 go build -o cortex-darwin-amd64 ./cmd/cortex

    - name: Build for macOS (Apple Silicon)
      run: GOOS=darwin GOARCH=arm64 go build -o cortex-darwin-arm64 ./cmd/cortex

    # Windows build dropped — see matrix comment above. We're not
    # shipping a Windows binary while the eval-harness work blocks it.

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          cortex-*
        retention-days: 7
